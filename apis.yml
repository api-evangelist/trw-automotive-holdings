aid: trw-automotive-holdings
name: TRW Automotive Holdings
description: >-
  TRW Automotive Holdings was one of the world's largest automotive parts suppliers,
  specializing in active and passive safety systems including braking systems, steering
  systems, suspension systems, seat belts, airbags, and advanced driver assistance systems.
  TRW Automotive was acquired by ZF Friedrichshafen AG in 2015 and is now part of ZF Group,
  operating as ZF TRW. The company's automotive safety technologies are integrated across
  major global OEMs. TRW no longer operates an independent developer API program; developer
  and partner integrations are handled through ZF Group's partner ecosystem.
